<!DOCTYPE html>
<html lang="en" ng-app="taskApp">
<head>
    <meta charset="UTF-8">
    <title>Ritika Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body ng-controller="TaskController">

    <div id="particles-js"></div>

    <div class="main-viewport">
        <header class="hero">
            <h1 class="glitch-text">Ritika Task Manager</h1>
            <div class="status-line">Organizing the chaos of the digital void.</div>
        </header>

        <div class="control-center">
            <div class="input-wrapper">
                <input type="text" class="core-input" ng-model="newTask.title" placeholder="Initialize new task...">
                <button class="action-trigger" ng-click="addTask()">DEPLOY</button>
            </div>
            <div class="search-wrapper">
                <input type="text" class="search-input" ng-model="searchText" placeholder="Filter memory...">
            </div>
        </div>

        <div class="flow-container">
            <div class="task-row" ng-repeat="task in tasks | filter:searchText" ng-class="{'task-complete': task.status === 'Completed'}">
                <div class="task-meta">
                    <span class="index">0{{$index + 1}}</span>
                    <h3>{{task.title}}</h3>
                </div>
                <div class="task-ops">
                    <button class="op-btn verify" ng-if="task.status !== 'Completed'" ng-click="completeTask(task)">SUBMIT</button>
                    <button class="op-btn terminal" ng-click="deleteTask(task._id)">TERMINATE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/particles-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
